<!DOCTYPE html>
<html>
<head>
<title>AI Customer Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>🤖 AI Customer Support</h2>

<input id="q" placeholder="Ask anything...">
<button onclick="reply()">Send</button>

<p id="ans"></p>

<script>
function reply() {
let q = document.getElementById("q").value.toLowerCase();

if(q.includes("price")){
document.getElementById("ans").innerHTML="Price: NPR 1,999";
}
else if(q.includes("delivery")){
document.getElementById("ans").innerHTML="Delivery available all over Nepal.";
}
else if(q.includes("location")){
document.getElementById("ans").innerHTML="Kathmandu, Nepal.";
}
else{
document.getElementById("ans").innerHTML="Thanks! Our team will contact you.";
}
}
</script>

</body>
</html>
