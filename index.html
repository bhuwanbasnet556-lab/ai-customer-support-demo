<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Business Assistant</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h2>🤖 Smart Business Assistant</h2>
      <p>24/7 Customer Support</p>
    </div>

    <div class="status">
      ● Online
    </div>
  </div>

  <div id="chatBox" class="chat-box">

    <div class="bot">
      👋 Namaste! Welcome.<br><br>

      Ask me anything about:
      <br>📦 Products
      <br>🚚 Delivery
      <br>📍 Location
      <br>💰 Price
      <br>📞 Contact
    </div>

  </div>

  <div class="quick">

<button onclick="quick('Price')">💰 Price</button>

<button onclick="quick('Delivery')">🚚 Delivery</button>

<button onclick="quick('Location')">📍 Location</button>

<button onclick="quick('Contact')">📞 Contact</button>

  </div>

  <div class="input-area">

<input
id="message"
placeholder="Type your message...">

<button onclick="sendMessage()">
Send
</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
